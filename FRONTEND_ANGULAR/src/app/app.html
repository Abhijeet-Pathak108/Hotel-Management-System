<router-outlet></router-outlet>

<!-- ALERT — always below everything else -->
<div class="gh-alert-wrap" *ngIf="alertService.show_alert" [ngClass]="alertService.type">
  <div class="gh-alert-top">

    <!-- Success Icon -->
    <div class="gh-icon-wrap" *ngIf="alertService.type === 'success'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <!-- Error Icon -->
    <div class="gh-icon-wrap" *ngIf="alertService.type === 'error'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>

    <!-- Warning Icon -->
    <div class="gh-icon-wrap" *ngIf="alertService.type === 'warning'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2.5">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>

    <!-- Info Icon -->
    <div class="gh-icon-wrap" *ngIf="alertService.type === 'info'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="16" x2="12" y2="12"/>
        <line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
    </div>

    <div class="gh-alert-body">
      <p class="gh-alert-title">{{ alertService.title }}</p>
      <p class="gh-alert-msg">{{ alertService.message }}</p>
    </div>

    <button class="gh-close" (click)="alertService.dismiss()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

  </div>
  <div class="gh-progress-bar"></div>
</div>
