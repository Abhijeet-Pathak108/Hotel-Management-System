<!DOCTYPE html>
<html lang="en">

<head>

    <title>Staff Role</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="staff.css">
</head>

<body>

    <header>
    <h2>Staff Dashboard</h2>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
</header>

    <div class="card">
        <span class="role-badge">STAFF</span>
        <div class="role-title">Service Staff</div>

        <p class="desc">Responsible for maintenance, complaints & on-site support.</p>

        <b>Capabilities:</b>
        <ul>
            <li>Mark complaints resolved</li>
            <li>Update room status</li>
            <li>Assist tenants on-site</li>
        </ul>

        <span class="stat">Task Level</span>
    </div>

    <footer>© 2026 Hostel / Property Management System</footer>\


    <script src="auth.js"></script>

<script src="staff.js"></script>
