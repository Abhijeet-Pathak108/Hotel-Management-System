<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Manager Role</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="manager.css">
    
</head>

<body>

    <header>
    <h2>Manager Dashboard</h2>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
    </header>

    <div class="card">
        <span class="role-badge">MANAGER</span>
        <div class="role-title">Operations Manager</div>

        <p class="desc">Manages onboarding, payments, staff and operational workflows.</p>

        <b>Capabilities:</b>
        <ul>
            <li>Approve tenant onboarding</li>
            <li>Assign rooms</li>
            <li>Approve payments</li>
            <li>Supervise staff</li>
        </ul>

        <span class="stat">Limited Admin</span>
    </div>

    <footer>© 2026 Hostel / Property Management System</footer>
</body>

<script src="auth.js"></script>

<script src="manager.js"></script>

</html>
