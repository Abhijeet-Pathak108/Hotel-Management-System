<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f1f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 25px 35px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            width: 350px;
        }
        .container h2 {
            text-align: center;
            margin-bottom: 25px;
        }
        label {
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            background: #4CAF50;
            padding: 10px;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover {
            background: #43a047;
        }
        .msg {
            margin-top: 10px;
            text-align: center;
            color: green;
            font-weight: bold;
        }
        .spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #eee;
  border-top-color: #3b82f6;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 10px auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

    </style>
</head>
<body>

    <button onclick="goToHome()">Home</button>

<div class="container">
    <h2>Register</h2>
    <form id="registerForm">
        <label>Username</label>
        <input type="text" id="username" required>

        <label>Password</label>
        <input type="password" id="password" required>

        <label>Role</label>
        <select id="role" required>
    <option value="" disabled selected>Select Role</option>
    <option value="ROLE_USER">Tenant</option>
    <option value="ROLE_STAFF">Staff</option>
    <option value="ROLE_MANAGER">Manager</option>
    <option value="ROLE_ADMIN">Admin</option>
</select>


        <button type="submit">Register</button>
        <a href="./login.html">Already Registerd?Login</a>

        <div class="spinner" id="loader" style="display:none;"></div>

        <div class="msg" id="msg"></div>
    </form>
</div>


<script src="auth.js"></script>
<script>

        // prevent direct access of register.html
    fetchWithAuth("/auth/home")
    .catch(() => {
        console.log("session expired");
        // window.location.href = "login.html";
        window.location.href = "home.html";
    });

    function goToHome(){
        window.location.href="home.html";
    }

    const form = document.getElementById("registerForm");
    // form.addEventListener("submit", loginFunction); // if you need this

    form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const loader = document.getElementById("loader");
    const msgBox = document.getElementById("msg");

    // show buffer
    loader.style.display = "block";
    msgBox.textContent = "";

    const data = {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
        role: document.getElementById("role").value
    };

    try { 
        const res = await fetch("http://localhost:8090/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        // hide buffer
        loader.style.display = "none";

        if (res.status === 409) {
            msgBox.style.color = "red";
            msgBox.textContent = "User already exists!";
            form.reset();
            return;
        }

        if (res.ok) {
            msgBox.style.color = "green";
            msgBox.textContent = "User registered successfully!";
            form.reset();
        } else {
            msgBox.style.color = "red";
            msgBox.textContent = "Registration failed!";
            form.reset();
        }

    } catch (err) {
        loader.style.display = "none";
        msgBox.style.color = "red";
        msgBox.textContent = "Network error! Try again.";
    }
});

</script>

</body>
</html>
